name: ARM64 Normalization Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Normalization Benchmark
        run: |
          make bench-norm-neon
