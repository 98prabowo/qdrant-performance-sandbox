name: ARM64 Horizontal Sum Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Horizontal Sum Benchmark
        run: |
          make bench-hsum-neon
